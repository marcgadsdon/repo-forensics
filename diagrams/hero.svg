<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none" version="1.1">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#111921"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="35%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="48%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.5"/>
      <stop offset="52%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="65%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="900" height="320" rx="12"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" clip-path="url(#clip)">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="900" y2="280" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="320" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="320" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="320" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="320" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="320" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="320" stroke="#58a6ff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="320" stroke="#58a6ff" stroke-width="0.5"/>
  </g>

  <!-- THE SWEEP - glowing scan line left to right -->
  <g clip-path="url(#clip)">
    <rect x="-250" y="0" width="350" height="320" fill="url(#sweep)">
      <animateTransform attributeName="transform" type="translate" from="-250,0" to="1150,0" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- BIG SHIELD with magnifying glass -->
  <g transform="translate(68, 50)" filter="url(#glow)">
    <!-- Shield body -->
    <path d="M60 8 L114 28 L114 80 C114 118 60 145 60 145 C60 145 6 118 6 80 L6 28 Z"
          fill="url(#shield-fill)" opacity="0.12" stroke="#58a6ff" stroke-width="1.5"/>

    <!-- Magnifying glass - big and clear -->
    <circle cx="54" cy="68" r="22" fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.85"/>
    <line x1="70" y1="84" x2="86" y2="100" stroke="#58a6ff" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

    <!-- Scanning dots INSIDE magnifier - the elements it spots -->
    <circle cx="44" cy="60" r="3" fill="#58a6ff" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="66" r="3" fill="#f85149" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="50" cy="76" r="3" fill="#3fb950" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
  </g>

  <!-- Title -->
  <g filter="url(#glow-text)">
    <text x="230" y="128" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
          font-size="54" font-weight="800" fill="#58a6ff" letter-spacing="5">REPO</text>
    <text x="230" y="186" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
          font-size="54" font-weight="800" fill="#58a6ff" letter-spacing="5">FORENSICS</text>
  </g>

  <!-- Tagline -->
  <text x="230" y="222" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="16" fill="#8b949e" letter-spacing="0.5">
    Deep security auditing for AI agent skills, repos, MCP servers, and plugins.
  </text>

  <!-- Stats bar -->
  <g transform="translate(230, 252)">
    <rect x="0" y="0" width="110" height="30" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="55" y="20" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#58a6ff" text-anchor="middle" font-weight="600">19 scanners</text>

    <rect x="120" y="0" width="120" height="30" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="180" y="20" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#f85149" text-anchor="middle" font-weight="600">750+ patterns</text>

    <rect x="250" y="0" width="80" height="30" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="290" y="20" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#3fb950" text-anchor="middle" font-weight="600">0 deps</text>

    <rect x="340" y="0" width="120" height="30" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="400" y="20" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#d29922" text-anchor="middle" font-weight="600">fully offline</text>

    <rect x="470" y="0" width="100" height="30" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="520" y="20" font-family="'SF Mono',Consolas,monospace" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="600">Python 3.8+</text>
  </g>

  <!-- Border -->
  <rect width="900" height="320" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>
</svg>
