name: Sync badge counts

# Keeps the README badges, prose counts, and diagram numbers in lockstep with
# the code. scan_*.py or test changes recompute scanners/tests automatically and
# commit the refreshed metrics.json + README + SVGs, so a stale badge is
# impossible. The version + stars + release-date badges are live shields.io
# endpoints and need no job.

on:
  push:
    branches: [main]
    paths:
      - "skills/repo-forensics/scripts/scan_*.py"
      - "skills/repo-forensics/tests/**"
      - ".claude-plugin/plugin.json"
      - "scripts/sync_badges.py"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-badges
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest (collection only; scanners are stdlib-only)
        run: pip install --quiet pytest
      - name: Recompute and write badge counts
        run: python3 scripts/sync_badges.py
      - name: Commit if anything drifted
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/badges/metrics.json README.md diagrams/*.svg
            git commit -m "chore: sync badge counts [skip ci]"
            git push
          else
            echo "Badge counts already current."
          fi
